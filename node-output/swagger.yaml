    "/api/order/state" : {
      "post" : {
        "tags" : [ "Работа с заявками" ],
        "summary" : "Получение состояния ранее созданной заявки на оформление Покупки частями(Callback)",
        "description" : "Как это работает <br/> \n*Магазин отправляет запрос на создание заявки оформления Покупки частями, с передачей параметра result_callback <br/> \n* После обработки операции Leobank на сервер магазина будет ооправлен POST запрос содержащий результат обработки запроса. Формат запроса будет аналогичен ответу сервиса проверки состояний (checkStateUsingPOST) <br/> \n*Для проверки подлинности запроса с сервера Leobank необходимо: <br/>  \n* сформировать signature на стороне вашего сервера, используя полученный от Leobank запрос. <br/>  \n  *полученное значение signature необходимо сравнить с полученной из Callback от Leobank <br/>  \n* если signature идентичны, значит Вы получили подлинный ответ от сервера Leobank(не измененный третьим лицом/без вмешательства третьих лиц) и можно продолжать выполнять операцию, в соответствии с полученным статусом платежа. Для получение текущего статуса транзакции до получения финального в Callback, используйте API сервиса проверки состояний checkStateUsingPOST, который можно выполнять в любой момент времени\n\nСтатус | Суб-статус | Пояснение\n------------ | ------------- | -------------\nSUCCESS | ACTIVE | заявка успешная, товар передан клиенту, деньги отправлены магазину. Финальный статус по заявке\nSUCCESS | DONE | заявка успешная, товар передан клиенту, деньги отправлены магазину, ПЧ погашен клиентом.\nSUCCESS | RETURNED | магазином принят возврат товара, деньги перечислены клиенту\nIN_PROCESS | WAITING_FOR_CLIENT | ожидания подтверждения от клиента кредитного договора в приложении Leobank\nIN_PROCESS | WAITING_FOR_STORE_CONFIRM | кредитная сделка ПЧ подтверждена клиентом. <font color=\"red\">Важно!</font> ключевой статус, после получения которого необходимо передать товар клиенту\nFAIL | CLIENT_NOT_FOUND | Клиент не найден. Варианты: не клиент Leobankа; указан не финансовый номер\nFAIL | EXCEEDED_SUM_LIMIT | Клиент превысил допустимый лимит на ПЧ. Лимит можно посмотреть в приложении Leobank в меню Рассрочка.\nFAIL | EXISTS_OTHER_OPEN_ORDER | У клиента есть другая открытая заявка на ПЧ. Решение: отменить открытую заявку в приложении клиентом или магазином методом reject; подождать 15 мин, заявка перейдет в статус CLIENT_PUSH_TIMEOUT\nFAIL | FAIL | Внутренняя ошибка на стороне Банка. Рекомендуем повторить подачу заявки через 5 мин.\nFAIL | NOT_ENOUGH_MONEY_FOR_INIT_DEBIT | Недостаточно средств для первого списания. Решение: пополнить карту монобанка на сумму первого платежа\nFAIL | REJECTED_BY_CLIENT | Клиент отказался от совершения покупки\nFAIL | RESTRICTED_BY_RISKS | Нужно обратиться в банк для получения причины отказа в ПЧ\nFAIL | CLIENT_PUSH_TIMEOUT | Клиент не принял решение по кредитному договору ПЧ в приложении Leobank. Кредитный договор активен 15 мин. Решение: связаться с клиентом; повторить заявку\nFAIL | REJECTED_BY_STORE | Магазин отказался от продажи\n",
