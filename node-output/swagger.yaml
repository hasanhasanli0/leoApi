    "description" : "# АПИ совершения сделки по Покупке частями\nСхема взаимодействия при оплате в магазине:\n*Клиент выбирает товар, который он хочет приобрести\n* Продавец формирует корзину платежей клиента\n*Кассир оформляет Покупке частями для Клиента\n* Магазин отправляем запрос в банк, используя сервис Подача заявки на оплату частями\n* Банк принимает заявку на создание платежа по программе Покупке частями\n* Банк принимает решение на оформление рассрочки в течении 20 секунд и отправляет в мобильное приложение Push клиенту с информаций о рассрочке по программе Покупке частями для подтверждения\n * Клиент ознакамливается с условиями рассрочки и подтверждает открытие\n * Банк отправляет Магазину ответ(Callback) checkStateUsingPOST с результатом оформления клиентом Покупке частями\n * Кассир печатает чек.\n* Магазин завершает заказ\n*Магазин информирует банк о результате завершения операции\n ** Произведена выдача товара клиенту (confirmUsingPOST)\n  **Товар клиенту не выдан rejectUsingPOST\n\nДиаграмма последовательности:<br/>\n!Диаграмма последовательности и схема взаимодействия : https://drive.google.com/file/d/1fIgJV1GR2DC9zpeBRVwVT4_D_IJt1Rfa/view?usp=sharing\n\n## ЧаВО\n\n* Когда магазин передает товар клиенту?\n   *После получения статуса WAITING_FOR_STORE_CONFIRM\n    \n# Авторизация (подпись запросов / ответов)\nВсе запросы и ответы к АПИ должны быть подписаны.\nПодпись передается в `header` параметре `signature`\nФормула подписи:\n\n```\nencodeBase64(\n   HmacSHA256(\n       getBytesUTF-8(\n           request_body\n       )\n   )\n)\n```\n\n* encodeBase64 - функция преобразования бинарных данных в Base64 формат [wiki](https://ru.wikipedia.org/wiki/Base64),\n*HmacSHA256 - функция вычисления хеша подписи данных [wiki](https://ru.wikipedia.org/wiki/HMAC),\n* getBytesUTF-8 - функция перевода строки в бинарное представление (в кодировке UTF-8) [wiki](https://ru.wikipedia.org/wiki/UTF-8),\n*request_body - тело запроса (или ответа)\n\nПример подписи на языке `java`:\n\n```java\n\nimport javax.crypto.Mac;\nimport javax.crypto.spec.SecretKeySpec;\nimport javax.xml.bind.DatatypeConverter;\n\nclass Main {\n  public static void main(String[] args) throws Exception {\n    String key = \"the shared secret key here\";\n    String message = \"the message to hash here\";\n    \n    Mac hasher = Mac.getInstance(\"HmacSHA256\");\n    hasher.init(new SecretKeySpec(key.getBytes(), \"HmacSHA256\"));\n    \n    byte[] hash = hasher.doFinal(message.getBytes());\n    \n    // to base64\n    DatatypeConverter.printBase64Binary(hash);\n  }\n}\n```\n\nПример подписи на `bash`\n\n```bash\n\nreadonly PRIVATE_KEY='the shared secret key here'\nreadonly REQUEST='the message to hash here'\nSIGNATURE=$(echo -n \"$REQUEST\" | openssl dgst -sha256 -hmac \"$PRIVATE_KEY\" -binary | base64)\n\necho \"$SIGNATURE\"\n```\n\nПример подписи на `php`\n\n```php\n\n<?php\n\n$url = 'https://u2-demo.ftband.com/api/order/create';\n$request_string = '{ \"store_order_id\": \"test_101\",\n  \"client_phone\": \"+994500000000\",\n  \"total_sum\": 1234.56,\n  \"invoice\": {\n    \"date\": \"2021-12-22\",\n    \"number\": \"1234-1234\",\n    \"point_id\": 1234,\n    \"source\": \"INTERNET\"\n  },\n  \"available_programs\": [\n    {\n      \"available_parts_count\": [\n        3,\n        4,\n        6,\n        9\n      ],\n      \"type\": \"payment_installments\"\n    }\n  ],\n  \"products\": [\n    {\n      \"name\": \"Телевизор\",\n      \"count\": 3,\n      \"sum\": 9999.99\n    }\n  ],\n  \"result_callback\": \"https://store-domain/handle/pay-part/result\"\n}';\n$signature = base64_encode(hash_hmac(\"sha256\", $request_string, \"secret_98765432--123-123\", true));\n\n$ch = curl_init();\ncurl_setopt($ch, CURLOPT_URL, $url);\ncurl_setopt($ch, CURLOPT_CUSTOMREQUEST, \"POST\");\ncurl_setopt($ch, CURLOPT_POSTFIELDS, $request_string);\ncurl_setopt($ch, CURLOPT_HTTPHEADER, array(\n    'store-id: test_store_with_confirm',\n    'signature: '.$signature,\n    'Content-Type: application/json',\n    'my-header: a66b0275-9872-4fa2-9489-d91b085495a4',\n    'Accept: application/json'\n));\n\n$server_output = curl_exec ($ch);\n\necho $ch;\necho $server_output;\n\ncurl_close ($ch);\n\n?>\n```\n\nПолный пример на языке `java` вызова сервиса:\n\n```java\n\nimport javax.crypto.Mac;\nimport javax.crypto.spec.SecretKeySpec;\nimport java.io.*;\nimport java.net.HttpURLConnection;\nimport java.net.URL;\nimport java.nio.charset.StandardCharsets;\nimport java.security.InvalidKeyException;\nimport java.security.NoSuchAlgorithmException;\nimport java.util.Base64;\n\npublic class Main {\n\n    private static final String STORE_ID = \"test_store_with_confirm\";\n    private static final String STORE_SECRET = \"secret_98765432--123-123\";\n\n    public static void main(String[] args) throws Exception {\n        new Main().signAndMakeRequest();\n    }\n\n    private void signAndMakeRequest() throws Exception {\n        final String request = \"{\\\"phone\\\": \\\"+994500000000\\\"}\";\n        String sign = signRequest(request);\n\n        final String serviceUrl = \"https://u2-demo.ftband.com/api/client/validate\";\n        URL url = new URL(serviceUrl);\n        HttpURLConnection urlConnection = (HttpURLConnection) url.openConnection();\n        try {\n            urlConnection.addRequestProperty(\"store-id\", STORE_ID);\n            urlConnection.addRequestProperty(\"signature\", sign);\n            urlConnection.addRequestProperty(\"Content-Type\", \"application/json\");\n            urlConnection.addRequestProperty(\"Accept\", \"application/json\");\n            urlConnection.setDoOutput(true);\n            try (OutputStream outputStream = urlConnection.getOutputStream()) {\n                outputStream.write(request.getBytes(StandardCharsets.UTF_8));\n            }\n\n            int responseCode = urlConnection.getResponseCode();\n            String responseBody = readResponseBody(urlConnection);\n            System.out.println(\"Service response code: \" + responseCode + \". Response body: \" + responseBody);\n        } finally {\n            urlConnection.disconnect();\n        }\n    }\n\n    private String signRequest(String request) throws NoSuchAlgorithmException, InvalidKeyException {\n        final String ALGORITHM = \"HmacSHA256\";\n        Mac mac = Mac.getInstance(ALGORITHM);\n        mac.init(new SecretKeySpec(STORE_SECRET.getBytes(StandardCharsets.UTF_8), ALGORITHM));\n        byte[] hash = mac.doFinal(request.getBytes(StandardCharsets.UTF_8));\n        Base64.Encoder encoder = Base64.getEncoder();\n        byte[] base64Hash = encoder.encode(hash);\n        return new String(base64Hash, StandardCharsets.UTF_8);\n    }\n\n    private String readResponseBody(HttpURLConnection urlConnection) throws IOException {\n        try (InputStream inputStream = urlConnection.getInputStream();\n             InputStreamReader reader = new InputStreamReader(inputStream, StandardCharsets.UTF_8);\n             StringWriter sw = new StringWriter()) {\n\n            char[] buffer = new char[256];\n            int n = 0;\n            while (-1 != (n = reader.read(buffer))) {\n                sw.write(buffer, 0, n);\n            }\n            return sw.toString();\n        }\n    }\n}\n```\n\n## Тестовая платформа\n Тестовая платформа на стадии разработки. Тестовая платформа будет содержать только 1 магазина и отдает только заранее подготовленные ситуации.\nstore-id: `test_store_with_confirm`\nключ: `secret_98765432--123-123`\nlink: https://test.leobank.com - для примера\n> \nВозможные ситуации:\n * Успешное подтверждение заявки. Для данной ситуации нужно передать номер телефона клиента, который заканчивается на 1.\n В данном случае через 5 секунд будет брошен callback об успешном уверждении заявки.\n *Заявка, котороая ожидает подтверждения от клента. Для данной ситуации нужно передать номер телефона клиента, который заканчивается на 2.\n* Ошибка подтверждения заявки по причине недостаточного лимита у клиента. \n Для данной ситуации нужно передать номер телефона клиента, который заканчивается на 3. \n В данном случае через 5 секунд будет брошен callback об отклонении заявки.\n * Заявка подтверждена клиентом и ожидает подтверждения от магазина (только для магазина с двухтактовым подтверждением).\n Для данной ситуации нужно передать номер телефона клиента, который заканчивается на 4.\n \n \n## Предпрод\nТестирование на предпроде будет доступно позже. Тестирование включает в себя взаимодействие API и мобильного приложения Leobank. \nРекомендуется после настройки запросов на песочнице.\n\nДля тестирования на предпроде используйте:\n\nstore-id: `COMFY`  \nключ: `sign_key`  \nlink: https://test.leobank.com - для примера\n>\nВнимание условия для заявки:\n\nномер телефона покупателя +994500000000\nколичество частей - 10  \nперед тестированием предупредить Евгения Шавуль\n\n\n## Production\nБоевая ссылка: https://test.leobank.com - для примера\n\n> Используйте после успешного прохождения теста и получения боевых ключей.\n\n\nКонтактные данные:\n\nЕвгений Шавуль\n\nemail: yevhen.shavul@fintech-farm.com\n\n",
